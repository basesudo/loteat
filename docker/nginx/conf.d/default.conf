server {
    listen 80;
    server_name localhost;
    root /var/www/html/service/public;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 处理 storage/app/public 路径（必须放在 /storage/ 之前）
    location ^~ /storage/app/public/ {
        alias /var/www/html/service/storage/app/public/;
        expires 1M;
        add_header Cache-Control "public, immutable";
    }

    # 处理 storage 路径（软链接）
    location ^~ /storage/ {
        alias /var/www/html/service/public/storage/;
        expires 1M;
        add_header Cache-Control "public, immutable";
    }

    # 修复 public/public 双重路径问题
    location ^~ /public/ {
        alias /var/www/html/service/public/;
        expires 1M;
        add_header Cache-Control "public, immutable";
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }
}
